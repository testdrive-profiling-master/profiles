[QEMU]
TITLE					= "TestDrive"
;x86_64(default), aarch64, riscv64, ppc64
SYSTEM					= x86_64
ACCELERATION			= whpx
SMP_SIZE				= 2
MEMORY_SIZE				= 4096
FULL_SCREEN				= false
VGA						= virtio
DISPLAY					= sdl,gl=on
HARD_DISK_IMAGE			= qemu_testdrive.qcow2
HARD_DISK_SIZE			= 50G
BOOT_FROM_CDROM			= true
CDROM_IMAGE				= 
KERNEL_IMAGE			=
RAM_DISK_IMAGE			=
BOOT_COMMAND			=
EXTRA_OPTIONS			=
; Attempts a forced refresh every 100 days. 
;AUTO_REFRESH_DAYS		= 100

[TESTDRIVE_DEVICE]
MAIN_VENDOR_ID			= 0x3323
MAIN_DEVICE_ID			= 0x3000
SUB_VENDOR_ID			= 0x0000
SUB_DEVICE_ID			= 0x0000
CLASS_ID				= 0xff00
REVISION				= 0x00
;ROM_FILE				= testdrive_device.rom
;SETUP_SCRIPT			= testdrive_device_setup.lua
